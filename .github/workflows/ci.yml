name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - uses: pnpm/action-setup@v5
        # version is read automatically from "packageManager" in package.json

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Pack for scanning
        id: pack_for_scan
        run: echo "package_tgz=$(pnpm pack --quiet)" >> "$GITHUB_OUTPUT"

      - name: Scan with n8n community package linter
        run: npx @n8n/scan-community-package "${{ steps.pack_for_scan.outputs.package_tgz }}"

      - name: Test
        run: pnpm test:coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage
          path: coverage/
